name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.ruby == 'head' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { ruby: '2.7', os: ubuntu-22.04 }
          - { ruby: '3.0', os: ubuntu-22.04 }
          - { ruby: '3.1', os: ubuntu-latest }
          - { ruby: '3.2', os: ubuntu-latest }
          - { ruby: '3.3', os: ubuntu-latest }
          - { ruby: '3.4', os: ubuntu-latest }
          - { ruby: '4.0', os: ubuntu-latest }
          - { ruby: 'head', os: ubuntu-latest }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run tests
        run: bundle exec rake test
